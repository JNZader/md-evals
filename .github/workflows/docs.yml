name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ['docs/**']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Docsify
        run: npm install -g docsify-cli

      - name: Generate Docs
        run: |
          cp docs/_sidebar.md /tmp/_sidebar.md
          cp docs/_coverpage.md /tmp/_coverpage.md 2>/dev/null || true
          cd docs
          rm -f _sidebar.md _coverpage.md
          docsify generate . --sidebar /tmp/_sidebar.md
          rm -rf .nojekyll 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/./

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
