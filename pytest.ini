[pytest]
# Marker definitions for organizing tests
markers =
    integration: Integration tests requiring external services
    unit: Unit tests (fast, isolated)
    slow: Slow-running tests
    benchmark: Performance benchmark tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
addopts = 
    --cov=md_evals
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --strict-markers
    -v
    --tb=short

# Ignore known warnings we can't control
filterwarnings =
    ignore::DeprecationWarning:jsonschema
    ignore::DeprecationWarning:referencing
    ignore::DeprecationWarning:aiohttp

# Output configuration
junit_family = xunit2

# Test timeout (optional, uncomment if needed)
# timeout = 10

# Minimum Python version
minversion = 7.0
