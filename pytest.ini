[pytest]
# ============================================================================
# MARKER DEFINITIONS - Organize tests by type and characteristics
# ============================================================================
markers =
    unit: Unit tests (fast, isolated, no external dependencies)
    integration: Integration tests (may use fixtures, mocks, or test services)
    e2e: End-to-end tests (full workflow execution)
    slow: Slow-running tests (>1 second execution time)
    performance: Performance benchmark tests (profiling, memory, speed)
    benchmark: Performance benchmark tests (alias for performance)
    xfail_known: Known failing tests (documented xfail with reason)
    requires_provider: Tests requiring external provider (mocked in CI)
    asyncio: Async tests (pytest-asyncio)

# ============================================================================
# TEST DISCOVERY PATTERNS - How pytest finds tests
# ============================================================================
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Tests should be in tests/ directory
testpaths = tests

# ============================================================================
# COVERAGE CONFIGURATION - Code coverage reporting
# ============================================================================
# Default coverage options
addopts = 
    --cov=md_evals
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=json:coverage.json
    --cov-branch
    --strict-markers
    -v
    --tb=short
    --durations=10

# Coverage thresholds (enforce minimum coverage levels)
# Uncomment to enforce in CI
# --cov-fail-under=96

# ============================================================================
# OUTPUT AND REPORTING
# ============================================================================
# JUnit XML for CI/CD integration
junit_family = xunit2

# Minimum Python version
minversion = 7.0

# ============================================================================
# WARNING FILTERS - Manage deprecation and other warnings
# ============================================================================
filterwarnings =
    # Ignore known third-party warnings
    ignore::DeprecationWarning:jsonschema
    ignore::DeprecationWarning:referencing
    ignore::DeprecationWarning:aiohttp
    ignore::DeprecationWarning:pkg_resources
    
    # Treat warnings as errors by default (catch issues early)
    # error::
    
    # But allow some specific deprecations to pass
    default::DeprecationWarning:md_evals

# ============================================================================
# PYTEST PLUGINS CONFIGURATION
# ============================================================================
# Plugins are auto-discovered via entry points, but can be configured here

# ============================================================================
# PERFORMANCE AND OPTIMIZATION
# ============================================================================
# Use assertion rewriting for better error messages
# (python_files defined above)

# Run tests in parallel (requires pytest-xdist)
# -n auto

# ============================================================================
# CUSTOM PYTEST CONFIGURATION
# ============================================================================
# Timeout for tests (if pytest-timeout is installed)
# timeout = 30

# Log configuration
log_cli = False
log_cli_level = INFO
log_file = test_run.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d - %(message)s

# ============================================================================
# XFAIL POLICIES - Configuration for expected failures
# ============================================================================
# Skip xfail tests in normal runs (show them separately)
# xfail_strict = True
