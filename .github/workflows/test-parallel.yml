name: Test Suite (Parallel)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }}, ${{ matrix.workers }} workers)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - '3.12'
          - '3.13'
          - '3.14'
        workers:
          - 4
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify pytest-xdist
        run: |
          python -c "import xdist; print(f'pytest-xdist {xdist.__version__} installed')"

      - name: Run tests in parallel (${{ matrix.workers }} workers)
        run: |
          pytest tests/ \
            -n ${{ matrix.workers }} \
            --cov=md_evals \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing:skip-covered \
            --junitxml=test-results.xml \
            -v --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  # Optional: Performance comparison job
  performance:
    name: Parallel Performance Report
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: "Benchmark: Serial vs Parallel"
        run: |
          echo "=== Serial Execution (Baseline) ===" 
          time pytest tests/ -q --tb=no 2>&1 | tail -20
          
          echo ""
          echo "=== Parallel Execution (4 workers, Phase 7 Optimal) ==="
          time pytest tests/ -n 4 -q --tb=no 2>&1 | tail -20

      - name: Generate Performance Report
        run: |
          echo "# Phase 7 Performance Report" > performance.md
          echo "" >> performance.md
          echo "**Parallel Test Execution Summary**" >> performance.md
          echo "" >> performance.md
          echo "- Workers: 4 (Phase 7 optimal configuration)" >> performance.md
          echo "- Expected Speed Improvement: 73% (24s → 6.6s)" >> performance.md
          echo "- Coverage Target: 95%+" >> performance.md
          echo "- All tests must pass without race conditions" >> performance.md
