<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>md-evals - AI Skill Evaluation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="description" content="Lightweight CLI tool for evaluating AI skills" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --theme-color: #6366f1;
      --sidebar-width: 280px;
    }
    
    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --theme-color: #818cf8;
      }
      .markdown-section {
        color: #e2e8f0;
      }
      .sidebar-nav > ul > li > a {
        color: #f1f5f9;
      }
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'md-evals',
      repo: 'https://github.com/JNZader/md-evals',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      themeColor: '#6366f1',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search'
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
